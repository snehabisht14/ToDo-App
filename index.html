<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <button onclick="toggleDarkMode()">Dark Mode</button>
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>To-Do List</h1>

        <!-- INPUT CARD -->
        <div class="card input-card">
            <input type="text" id="task-input" placeholder="What do you want to do today?">
            <button onclick="addTask()">Add Task</button>
        </div>

        <!-- STATS -->
        <div class="card stats">
            <div>Total<br><span id="total">0</span></div>
            <div>Pending<br><span id="pending">0</span></div>
            <div>Done<br><span id="completed">0</span></div>
        </div>

        <!-- FILTERS -->
        <div class="filters">
            <button onclick="showAll()">All</button>
            <button onclick="showPending()">Pending</button>
            <button onclick="showCompleted()">Completed</button>
        </div>

        <!-- TASKS -->
        <div class="tasks">

            <div class="task-section">
                <h3>Pending</h3>
                <ul id="pending-list"></ul>
            </div>

            <div class="task-section">
                <h3>Completed</h3>
                <ul id="completed-list"></ul>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
